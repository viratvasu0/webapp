name: Delete Branch

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: "Branch name to delete"
        required: true

permissions:
  contents: write

jobs:
  delete-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate input
        run: |
          if [ -z "${{ github.event.inputs.branch_name }}" ]; then
            echo "Branch name cannot be empty"
            exit 1
          fi

      - name: Check if branch exists
        run: |
          git fetch origin
          if git show-ref --verify --quiet refs/remotes/origin/${{ github.event.inputs.branch_name }}
          then
            echo "Branch exists"
          else
            echo "Branch does not exist"
            exit 1
          fi

      - name: Prevent deletion of protected branches
        run: |
          if [[ "${{ github.event.inputs.branch_name }}" == "main" || \
                "${{ github.event.inputs.branch_name }}" == "develop" ]]; then
            echo "Protected branch. Cannot delete."
            exit 1
          fi

      - name: Delete branch
        run: |
          git push origin --delete ${{ github.event.inputs.branch_name }}
