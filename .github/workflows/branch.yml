name: Create New Branch

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: "Source branch to copy from"
        required: true
        default: "main"
      new_branch:
        description: "New branch name to create"
        required: true

jobs:
  create-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_branch }}
          fetch-depth: 0  # Important for full history

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Create new branch
        run: |
          git checkout -b ${{ github.event.inputs.new_branch }}

      - name: Push new branch
        run: |
          git push origin ${{ github.event.inputs.new_branch }}
